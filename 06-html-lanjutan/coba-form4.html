<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coab Elemen Form di dalam Table</title>
</head>

<body>

  <h1>Contoh elemen-elemen form pada HTML</h1>
  <form>
    <table border="0" cellpadding="5" cellspacing="0">
      <tr>
        <td>
          <label for="name">Nama:</label>
        </td>
        <td>
          <input type="text" name="name" id="name" placeholder="Masukkan Nama..." autofocus autocomplete="off" required>
        </td>
      </tr>
      <tr>
        <td>
          <label for="password">Password:</label>
        </td>
        <td>
          <input type="password" name="password" id="password" placeholder="Masukkan Password...">
        </td>
      </tr>
      <tr>
        <td>
          <label for="email">email:</label>
        </td>
        <td>
          <input type="email" name="email" id="email" placeholder="Masukkan email...">
        </td>
      </tr>
      <tr>
        <td>
          <label for="number">Angka:</label>
        </td>
        <td>
          <input type="number" name="number" id="number" min="0" max="100" placeholder="Masukkan angka..." step="5">
        </td>
      </tr>
      <tr>
        <td>
          <label for="date">Tanggal:</label>
        </td>
        <td>
          <input type="date" name="date" id="date">
        </td>
      </tr>
      <tr>
        <td>
          <label for="color">Warna:</label>
        </td>
        <td>
          <input type="color" name="color" id="color">
        </td>
      </tr>
      <tr>
        <td>
          <label for="file">Masukkan file:</label>
        </td>
        <td>
          <input type="file" name="file" id="file">
        </td>
      </tr>
      <tr>
        <td colspan="2" align="center">
          <button type="submit">Kirim</button>
        </td>
      </tr>
    </table>
    <br>
  </form>

</body>

</html>
