<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coab Element Form</title>
</head>

<body>

  <h1>Contoh elemen-elemen form pada HTML</h1>
  <form action="">
    <label for="name">Nama:
      <input type="text" name="name" id="name" placeholder="Masukkan Nama...">
    </label>
    <br>
    <label for="password">Password:
      <input type="password" name="password" id="password" placeholder="Masukkan Password...">
    </label>
    <br>
    <label for="email">email:
      <input type="email" name="email" id="email" placeholder="Masukkan email...">
    </label>
    <br>
    <label for="number">Angka:
      <input type="number" name="number" id="number" min="0" max="100" placeholder="Masukkan angka..." step="5">
    </label>
    <br>
    <label for="date">Tanggal:
      <input type="date" name="date" id="date">
    </label>
    <br>
    <label for="color">Warna:
      <input type="color" name="color" id="color">
    </label>
    <br>
    <label for="file">Masukkan file:
      <input type="file" name="file" id="file">
    </label>
    <br>
    <button type="submit">Kirim</button>
  </form>

</body>

</html>
