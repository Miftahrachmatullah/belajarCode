<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coba Background</title>
  <style>
    body {
      background-color: aqua;
      background-image: linear-gradient(20deg, lightblue 20%, blue, aqua 50%, aquamarine);
      height: 100vh;
    }

    .kotak1 {
      width: 200px;
      height: 200px;
      background-color: rgb(255, 0, 0);
      background-image: linear-gradient(to bottom, salmon, purple);
    }

    .kotak2 {
      width: 200px;
      height: 200px;
      background-color: rgb(255, 0, 0);
      background-image: radial-gradient(red, blue);
    }

    .kotak3 {
      width: 200px;
      height: 200px;
      background-color: rgb(255, 0, 0);
      background-image: conic-gradient( yellow, blue, red);
    }
  </style>
</head>

<body>
  <div class="kotak1"></div>
  <div class="kotak2"></div>
  <div class="kotak3"></div>
</body>

</html>
