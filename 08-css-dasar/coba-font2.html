<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coba CSS - Font Styling</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    @font-face {
      font-family: myfont;
      src: url(font/GoogleSans-Regular.ttf) format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    h1 {
      color: crimson;
      font-size: 60px;
      text-align: center;
      font-family: "Poppins", sans-serif;
      font-weight: 700;
    }

    p {
      color: navy;
      font-size: 20px;
      text-align: center;
      font-family: poppins, sans-serif;
    }

    .myfont {
      font-family: myfont;
    }
  </style>
</head>

<body>
  <h1>Hello World!</h1>
  <p class="myfont">Lorem ipsum dolor sit amet consectetur adipisicing elit. Ullam natus error quo consectetur deserunt
    nihil
    repellendus hic culpa eveniet velit!</p>
  <p class="myfont">Lorem ipsum dolor sit amet consectetur adipisicing elit. Minima culpa rem, nam saepe temporibus
    provident dolore
    eaque ut id aut.</p>
</body>

</html>
