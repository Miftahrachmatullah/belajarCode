<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Styling</title>
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: rgb(54, 53, 53);
      text-align: center;
    }

    h1 {
      font-size: 50px;
      font-style: italic;
      text-transform: uppercase;
      word-spacing: 20px;
      letter-spacing: 10px;
      text-shadow: 5px 3px 1px gray;
      text-decoration: underline;
      text-decoration-style: wavy;
      text-decoration-color: rgb(54, 53, 53);
    }

    span {
      color: gray;
      text-decoration: line-through;
    }

    .quote {
      font-size: 20px;
      word-spacing: 10px;
      line-height: 2em;
    }

    .cite {
      color: gray;
      font-size: 10px;
      word-spacing: 5px;
      letter-spacing: 2px;
      font-weight: normal;
    }
  </style>
</head>

<body>
  <h1>Fase Runtuh</h1>
  <p class="quote">"Tak perlu khawatir, ku hanya <span>terluka</span>.<br> Terbiasa tuk pura-pura ketawa.<br> Namun
    bolehkan
    sekali saja ku menangis?<br> Sebelum kembali membohongi diri."</p>
  <p class="cite">- feby putri feat. fiersa besari</p>
</body>

</html>
